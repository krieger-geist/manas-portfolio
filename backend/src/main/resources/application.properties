# Server
server.port=${PORT:8080}

# Mail (Gmail SMTP with an App Password - see README)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Where contact form messages get delivered
contact.to-email=${CONTACT_TO_EMAIL:manas240surya@gmail.com}

# Comma-separated list of frontend origins allowed to call this API
app.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5500,http://127.0.0.1:5500}

# Don't leak stack traces in error responses
server.error.include-message=never
server.error.include-stacktrace=never
